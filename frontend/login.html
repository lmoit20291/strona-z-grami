<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Logowanie</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>🎮 Strona z Grami</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="games.html">Gry</a>
    <a href="login.html" id="authBtn">Logowanie</a>
  </nav>
</header>

<main class="container center">
  <div class="login-box">
    <h2 id="formTitle">Logowanie</h2>

    <input id="email" type="text" placeholder="Email" required>
    <input id="password" type="password" placeholder="Hasło" required>

    <div id="registerExtra" style="display:none; width:100%;">
      <input id="username" type="text" placeholder="Nazwa użytkownika"  required>
    </div>

    <button onclick="submitForm()" id="mainBtn">Zaloguj</button>

    <p id="msg"></p>

    <p class="switch" onclick="toggleForm()">Nie masz konta? Zarejestruj się</p>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
